name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for trusted publishing (no API token needed)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_API_TOKEN secret needed.
        # Set up at: pypi.org → your project → Publishing → Add publisher
        # Publisher: GitHub Actions
        # Repository: swarmhawk-ai/swarmhawk
        # Workflow: publish.yml
        # Environment: pypi
